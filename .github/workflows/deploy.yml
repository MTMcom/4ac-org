name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          SSH_USER: u398531889
          DEPLOY_PATH: /home/domains/4ac.org/public_html/
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | tr -d '\r' > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keyscan -p 65002 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -avz --delete \
            -e "ssh -i /tmp/deploy_key -p 65002 -o StrictHostKeyChecking=no" \
            index.html palette-algorithm.html assets/ \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH"
          rm /tmp/deploy_key
